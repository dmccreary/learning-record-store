<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sine Wave MicroSim Using p5.js version 1.11.10</title>
    <script src="https://cdn.jsdelivr.net/npm/p5@1.11.10/lib/p5.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, Helvetica, sans-serif;
        }
        canvas {
            display: block;
        }
        .xapi-panel {
            margin: 12px 10px 0 10px;
            border: 1px solid silver;
            border-radius: 6px;
            background: white;
            padding: 10px 12px;
            box-sizing: border-box;
        }
        .xapi-panel-header {
            font-size: 14px;
            margin-bottom: 6px;
            color: #222;
        }
        .xapi-header-note {
            color: #666;
            font-weight: normal;
        }
        .xapi-log {
            max-height: 150px;
            overflow-y: auto;
            background: #1e1e1e;
            color: #b5f4b5;
            font-family: 'Courier New', Courier, monospace;
            font-size: 11px;
            line-height: 1.5;
            padding: 8px;
            border-radius: 4px;
        }
        .xapi-log-line {
            white-space: nowrap;
            overflow-x: auto;
        }
        .xapi-concept-scores {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }
        @media (max-width: 480px) {
            .xapi-concept-scores {
                grid-template-columns: 1fr;
            }
        }
        .xapi-concept-score {
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            background: #fafafa;
            padding: 8px 10px;
        }
        .xapi-overall {
            margin-bottom: 10px;
        }
        .xapi-overall-combined {
            border-top: 1px dotted #ddd;
            padding-top: 8px;
        }
        .xapi-overall-label {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .xapi-bar {
            background: #e0e0e0;
            border-radius: 6px;
            height: 14px;
            overflow: hidden;
        }
        .xapi-bar-fill {
            background: #2e7d32;
            height: 100%;
            transition: width 0.3s ease;
        }
        .xapi-overall-value {
            font-size: 13px;
            margin-top: 4px;
            color: #333;
        }
        .xapi-caveat {
            font-size: 11px;
            font-style: italic;
            color: #777;
            margin-top: 4px;
        }
        .xapi-table-wrap {
            overflow-x: auto;
        }
        .xapi-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-bottom: 10px;
        }
        .xapi-table th, .xapi-table td {
            text-align: left;
            padding: 4px 6px;
            border-bottom: 1px solid #eee;
            white-space: nowrap;
        }
        .xapi-yes {
            color: #2e7d32;
            font-weight: bold;
        }
        .xapi-no {
            color: #b71c1c;
        }
        .xapi-vertex {
            background: #f7f7fb;
            border: 1px dashed #b0b0c0;
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 12px;
        }
        .xapi-vertex-title {
            font-weight: bold;
            margin-bottom: 6px;
            color: #333;
        }
        .xapi-vertex-title code {
            background: #e8e8f0;
            padding: 1px 4px;
            border-radius: 3px;
        }
        .xapi-vertex-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px 12px;
        }
        .xapi-vertex-grid div {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dotted #ddd;
            padding: 2px 0;
        }
        .xapi-vertex-grid span {
            color: #555;
        }
    </style>
    <!-- Put your script file name here -->
    <script src="sine-wave.js"></script>
</head>
<body>
    <!-- Put the following lines in your setup() function
    const canvas = createCanvas(400, 400);
    canvas.parent('canvas-container');
    -->
    <main></main>
    
    <a href="./">Back to Lesson Plan</a>
</body>
</html>
