<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Two Kinds of Identity</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="graph-panel">
            <div id="network"></div>
            <div class="title">Two Kinds of &ldquo;Identity&rdquo;</div>
        </div>
        <div class="info-panel">
            <h3>Details</h3>
            <div id="info-display"><p class="info-placeholder">Click a node to see details</p></div>
        </div>
    </div>
    <script>
        const TEAL = { background: '#2a9d8f', border: '#1f7a6f' };
        const VIOLET = { background: '#7b6cc4', border: '#544a91' };
        window.GRAPH = {
            layout: 'hierarchical', direction: 'UD',
            nodes: [
                { id: 'Root', label: 'Two systems that both say "identity"', color: { background: '#37474f', border: '#1c2529' } },
                { id: 'L0', label: 'Learner Identity (Chapter 6)', color: TEAL, borderWidth: 4 },
                { id: 'L1', label: 'Raw actor in an xAPI statement', color: TEAL },
                { id: 'L2', label: 'identity service (per-district HMAC salt)', color: TEAL },
                { id: 'L3', label: 'student_key (pseudonymous)', color: TEAL },
                { id: 'L4', label: 'Used by: Stream Processor, analytics stores. Never a login.', color: TEAL },
                { id: 'H0', label: 'Human Identity (this chapter)', color: VIOLET, borderWidth: 4 },
                { id: 'H1', label: 'District admin / teacher / author logs in', color: VIOLET },
                { id: 'H2', label: 'Keycloak (dev) / customer IdP (prod), OpenID Connect', color: VIOLET },
                { id: 'H3', label: 'Signed token carrying a role', color: VIOLET },
                { id: 'H4', label: 'Used by: Admin API, Analytics API, Dash. Enforces RBAC.', color: VIOLET }
            ],
            edges: [
                { from: 'Root', to: 'L0' }, { from: 'L0', to: 'L1' }, { from: 'L1', to: 'L2' }, { from: 'L2', to: 'L3' }, { from: 'L3', to: 'L4' },
                { from: 'Root', to: 'H0' }, { from: 'H0', to: 'H1' }, { from: 'H1', to: 'H2' }, { from: 'H2', to: 'H3' }, { from: 'H3', to: 'H4' }
            ],
            nodeInfo: {
                'Root': { title: 'Two "identities"', description: 'Two entirely separate systems both use the word &ldquo;identity.&rdquo; Keeping them apart is essential: one is about pseudonymizing learners, the other about logging in humans.' },
                'L0': { title: 'Learner Identity', description: 'The Chapter 6 pseudonymization system. It answers &ldquo;which learner is this statement about?&rdquo; without ever storing a login. Contrast with Human Identity, which is about who is signed in.' },
                'L1': { title: 'Raw actor', description: 'The directly-identifying actor (homePage + name) inside an incoming statement &mdash; the only place raw learner identity exists.' },
                'L2': { title: 'identity service', description: 'Applies a per-district HMAC salt to pseudonymize the actor. This service is NOT a login system.' },
                'L3': { title: 'student_key', description: 'The irreversible pseudonymous key. Everything downstream uses this &mdash; it can never be used to log in.' },
                'L4': { title: 'Consumers', description: 'Used by the Stream Processor and analytics stores. Breach exposure: the pseudonymous keys and their analytics &mdash; but not names, and not login credentials.' },
                'H0': { title: 'Human Identity', description: 'This chapter&rsquo;s human SSO system. It answers &ldquo;who is logged in, and what may they do?&rdquo; &mdash; a completely different concern from pseudonymizing learners.' },
                'H1': { title: 'Human logs in', description: 'A district admin, teacher, or author signs in &mdash; a real person with credentials.' },
                'H2': { title: 'Keycloak / IdP', description: 'Keycloak in dev, a customer identity provider in prod, using OpenID Connect. This IS a login system.' },
                'H3': { title: 'Signed token', description: 'On success the IdP issues a signed token carrying the user&rsquo;s role.' },
                'H4': { title: 'Consumers', description: 'Used by the Admin API, Analytics API, and Dash dashboards to enforce RBAC. Breach exposure: an attacker could impersonate a logged-in human &mdash; a different risk than the learner-key system, which is why they are kept apart.' }
            }
        };
    </script>
    <script src="vis-app.js"></script>
</body>
</html>
