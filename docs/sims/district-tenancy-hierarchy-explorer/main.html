<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>District Tenancy Hierarchy Explorer</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="graph-panel">
            <div id="network"></div>
            <div class="title">District Tenancy Hierarchy</div>
        </div>
        <div class="info-panel">
            <h3>Details</h3>
            <div id="info-display"><p class="info-placeholder">Click a node to see details</p></div>
        </div>
    </div>
    <script>
        const D = { background: '#0f5c53', border: '#0a3f39' };
        const S = { background: '#1a7f72', border: '#12695f' };
        const C = { background: '#2a9d8f', border: '#1f7a6f' };
        const SEC = { background: '#5cbcb0', border: '#3bab9d' };
        const EN = { background: '#a7ddd5', border: '#5cbcb0' };
        const AMBER = { background: '#e9a23b', border: '#b8791f' };
        const dark = { color: '#08312c' };
        window.GRAPH = {
            layout: 'hierarchical', direction: 'UD',
            nodes: [
                { id: 'District', label: 'District (hard isolation)', color: D, borderWidth: 4 },
                { id: 'Sch1', label: 'School A', color: S },
                { id: 'Sch2', label: 'School B', color: S },
                { id: 'Co1', label: 'Course: Biology', color: C },
                { id: 'Co2', label: 'Course: Algebra', color: C },
                { id: 'Se1', label: 'Section: Bio P3', color: SEC, font: dark },
                { id: 'Se2', label: 'Section: Alg P5', color: SEC, font: dark },
                { id: 'En1', label: 'Enrollment (student)', color: EN, font: dark },
                { id: 'En2', label: 'Enrollment (student)', color: EN, font: dark },
                { id: 'En3', label: 'Enrollment (student)', color: EN, font: dark },
                { id: 'TV', label: 'Textbook Version', color: AMBER, font: { color: '#222' } }
            ],
            edges: [
                { from: 'District', to: 'Sch1' }, { from: 'District', to: 'Sch2' },
                { from: 'Sch1', to: 'Co1' }, { from: 'Sch2', to: 'Co2' },
                { from: 'Co1', to: 'Se1' }, { from: 'Co2', to: 'Se2' },
                { from: 'Se1', to: 'En1' }, { from: 'Se1', to: 'En2' }, { from: 'Se2', to: 'En3' },
                { from: 'Se1', to: 'TV', label: 'DEPLOYS', dashes: true }
            ],
            nodeInfo: {
                'District': { title: 'District (hard boundary)', description: 'The tenant and the HARD isolation boundary. No cross-district query is possible without explicit, de-identified system-admin benchmarking. Everything below nests inside it.' },
                'Sch1': { title: 'School', description: 'A school within the district. Boundary here is SOFT &mdash; enforced by role scope, not hard isolation. Key properties: school_id, name, grade_band.' },
                'Sch2': { title: 'School', description: 'Another school in the same district. Soft, role-scoped boundary. Key properties: school_id, name, grade_band.' },
                'Co1': { title: 'Course', description: 'A course offered by a school. Soft boundary. Key properties: course_id, title, subject.' },
                'Co2': { title: 'Course', description: 'Another course. Key properties: course_id, title, subject.' },
                'Se1': { title: 'Section', description: 'A class period / cohort. Soft boundary. Key properties: section_id, period, term, academic_year.' },
                'Se2': { title: 'Section', description: 'Another section. Key properties: section_id, period, term, academic_year.' },
                'En1': { title: 'Enrollment', description: 'The student-to-section relationship &mdash; how a pseudonymous student attaches to a section. Not a level, a relationship.' },
                'En2': { title: 'Enrollment', description: 'Another student&rsquo;s enrollment in the same section.' },
                'En3': { title: 'Enrollment', description: 'A student enrolled in the Algebra section.' },
                'TV': { title: 'Textbook Version (DEPLOYS)', description: 'A Textbook Version deployed onto a Section via the DEPLOYS edge. Shown in amber to separate &ldquo;who a student is&rdquo; from &ldquo;what content they see.&rdquo; Previews the Textbook Deployment UI later in this chapter.' }
            }
        };
    </script>
    <script src="vis-app.js"></script>
</body>
</html>
