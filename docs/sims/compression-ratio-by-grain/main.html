<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Compression Ratio by Grain</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #fff; color: #222; }
        .wrap { padding: 8px 12px; }
        h2 { font-size: 16px; color: #1a3a5c; text-align: center; margin: 4px 0 8px; }
        .chart-box { position: relative; height: 340px; }
        .controls { text-align: center; margin: 8px 0; }
        button { font-size: 13px; padding: 6px 12px; border: 1px solid #2a9d8f; background: #fff; color: #1f7a6f; border-radius: 5px; cursor: pointer; margin: 0 4px; }
        button.active { background: #2a9d8f; color: #fff; }
        .caption { font-size: 13px; color: #555; text-align: center; max-width: 660px; margin: 6px auto; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="wrap">
        <h2>Storage Compression Ratio by Grain</h2>
        <div class="chart-box"><canvas id="c"></canvas></div>
        <div class="controls">
            <button id="logBtn" class="active">Log scale</button>
            <button id="linBtn">Linear scale</button>
        </div>
        <p class="caption">Statements coalesced into one summary vertex. SectionRollup compresses ~3,000:1 because one section+concept grain absorbs every enrolled student's evidence &mdash; far more than a per-student grain.</p>
    </div>
    <script>
        const labels = ['QuestionResponse', 'PageEngagement', 'MicroSimEngagement', 'ConceptMastery', 'SectionRollup'];
        const values = [3, 40, 60, 100, 3000];
        const ranges = [
            'QuestionResponse: ~1-5 responses -> 1 vertex, ~3:1. Grain key: (student, question)',
            'PageEngagement: ~20-60 events -> 1 vertex, ~40:1. Grain key: (student, page)',
            'MicroSimEngagement: ~30-90 events -> 1 vertex, ~60:1. Grain key: (student, microsim)',
            'ConceptMastery: ~50-200 evidence events -> 1 vertex, ~100:1. Grain key: (student, concept)',
            'SectionRollup: ~1,000-5,000 events -> 1 vertex, ~3,000:1. Grain key: (section, concept)'
        ];
        const colors = ['#a7ddd5', '#5cbcb0', '#3bab9d', '#2a9d8f', '#12695f'];
        const chart = new Chart(document.getElementById('c'), {
            type: 'bar',
            data: { labels: labels, datasets: [{ label: 'Statements per summary vertex', data: values, backgroundColor: colors, borderColor: '#1f7a6f', borderWidth: 1 }] },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: { callbacks: { label: function (ctx) { return ranges[ctx.dataIndex]; } } }
                },
                scales: {
                    y: { type: 'logarithmic', title: { display: true, text: 'Statements per summary vertex (log scale)' } },
                    x: { title: { display: true, text: 'Summary vertex (grain)' } }
                }
            }
        });
        function setScale(type) {
            chart.options.scales.y.type = type;
            chart.options.scales.y.title.text = 'Statements per summary vertex (' + (type === 'logarithmic' ? 'log' : 'linear') + ' scale)';
            chart.update();
            document.getElementById('logBtn').classList.toggle('active', type === 'logarithmic');
            document.getElementById('linBtn').classList.toggle('active', type === 'linear');
        }
        document.getElementById('logBtn').onclick = function () { setScale('logarithmic'); };
        document.getElementById('linBtn').onclick = function () { setScale('linear'); };
    </script>
</body>
</html>
