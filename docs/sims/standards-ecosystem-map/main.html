<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Standards Ecosystem Map</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="graph-panel">
            <div id="network"></div>
            <div class="title">Standards Governance &mdash; Two Families</div>
        </div>
        <div class="info-panel">
            <h3>Details</h3>
            <div id="info-display"><p class="info-placeholder">Click a hub or spec to see details</p></div>
        </div>
    </div>
    <script>
        const TEAL = { background: '#2a9d8f', border: '#1f7a6f' };
        const TEALHUB = { background: '#12695f', border: '#0a3f39' };
        const AMBER = { background: '#e9a23b', border: '#b8791f' };
        const AMBERHUB = { background: '#b8791f', border: '#8a5a1c' };
        window.GRAPH = {
            layout: 'physics',
            nodes: [
                { id: 'IEEE', label: 'IEEE LTSC', color: TEALHUB, borderWidth: 3 },
                { id: 'ADL', label: 'ADL Initiative', color: TEALHUB, borderWidth: 3 },
                { id: 'I2IDL', label: 'I2IDL', color: TEALHUB, borderWidth: 3 },
                { id: 'Edtech', label: '1EdTech Consortium', color: AMBERHUB, borderWidth: 3, font: { color: '#222' } },
                { id: 'xapicore', label: 'IEEE 9274.1.1-2023 (xAPI core)', color: TEAL },
                { id: 'LOM', label: 'Learning Object Metadata (IEEE 1484.12.1)', color: TEAL },
                { id: 'xapi', label: 'xAPI (origin)', color: TEAL },
                { id: 'cmi5', label: 'cmi5', color: TEAL },
                { id: 'TLA', label: 'Total Learning Architecture', color: TEAL },
                { id: 'conf', label: 'xAPI Conformance Suite', color: TEAL },
                { id: 'profsrv', label: 'xAPI Profile Server', color: TEAL },
                { id: 'tlaref', label: 'TLA Reference Implementation', color: TEAL },
                { id: 'LTI', label: 'Learning Tools Interoperability (LTI)', color: AMBER, font: { color: '#222' } },
                { id: 'QTI', label: 'Question & Test Interoperability (QTI)', color: AMBER, font: { color: '#222' } },
                { id: 'Caliper', label: 'Caliper Analytics', color: AMBER, font: { color: '#222' } }
            ],
            edges: [
                { from: 'IEEE', to: 'xapicore' }, { from: 'IEEE', to: 'LOM' },
                { from: 'ADL', to: 'xapi' }, { from: 'ADL', to: 'cmi5' }, { from: 'ADL', to: 'TLA' },
                { from: 'I2IDL', to: 'conf' }, { from: 'I2IDL', to: 'profsrv' }, { from: 'I2IDL', to: 'tlaref' },
                { from: 'Edtech', to: 'LTI' }, { from: 'Edtech', to: 'QTI' }, { from: 'Edtech', to: 'Caliper' }
            ],
            nodeInfo: {
                'IEEE': { title: 'IEEE LTSC', description: 'The IEEE Learning Technology Standards Committee. It stewards the balloted xAPI core standard and Learning Object Metadata.' },
                'ADL': { title: 'ADL Initiative', description: 'The U.S. Advanced Distributed Learning Initiative &mdash; origin of xAPI, cmi5, and the Total Learning Architecture concept.' },
                'I2IDL': { title: 'I2IDL', description: 'Operates the running tooling for the xAPI/TLA family: the Conformance Suite, the Profile Server, and the TLA Reference Implementation.' },
                'Edtech': { title: '1EdTech Consortium', description: 'A separate governance family (formerly IMS Global) governing LTI, QTI, and Caliper Analytics &mdash; distinct from the xAPI/ADL/IEEE/I2IDL family.' },
                'xapicore': { title: 'IEEE 9274.1.1-2023', description: 'The published xAPI core standard (Chapter 3): Statement structure, RESTful API, conformance requirements.' },
                'LOM': { title: 'Learning Object Metadata', description: 'IEEE 1484.12.1 &mdash; a schema for describing learning resources, referenced by content repositories (this chapter).' },
                'xapi': { title: 'xAPI (origin)', description: 'The Experience API, originated by ADL via Project Tin Can (Chapter 1).' },
                'cmi5': { title: 'cmi5', description: 'An xAPI Application Profile for launching and tracking assignable units (Chapter 3).' },
                'TLA': { title: 'Total Learning Architecture', description: 'ADL&rsquo;s vision for how learning systems interoperate around an LRS (Chapter 3).' },
                'conf': { title: 'xAPI Conformance Suite', description: 'I2IDL-operated tests that check an LRS conforms to the xAPI standard.' },
                'profsrv': { title: 'xAPI Profile Server', description: 'I2IDL-operated infrastructure that hosts published Application Profiles.' },
                'tlaref': { title: 'TLA Reference Implementation', description: 'I2IDL-operated working demo of the Total Learning Architecture.' },
                'LTI': { title: 'Learning Tools Interoperability', description: '1EdTech standard for launching external tools from an LMS. Different governance family from xAPI.' },
                'QTI': { title: 'Question & Test Interoperability', description: '1EdTech standard for portable assessment items.' },
                'Caliper': { title: 'Caliper Analytics', description: '1EdTech&rsquo;s learning-analytics event standard &mdash; a peer/alternative to xAPI, governed by 1EdTech rather than the ADL/IEEE family.' }
            }
        };
    </script>
    <script src="vis-app.js"></script>
</body>
</html>
