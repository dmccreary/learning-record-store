<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Build Steps to Host Tier</title>
    <script src="https://unpkg.com/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.js"></script>
    <link href="https://unpkg.com/vis-timeline@7.7.3/styles/vis-timeline-graph2d.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #fff; color: #222; }
        .wrap { padding: 8px 12px; }
        h2 { font-size: 16px; color: #1a3a5c; text-align: center; margin: 4px 0 6px; }
        .controls { text-align: center; margin-bottom: 6px; }
        button { font-size: 13px; padding: 6px 12px; border: 1px solid #2a9d8f; background: #fff; color: #1f7a6f; border-radius: 5px; cursor: pointer; }
        button.active { background: #2a9d8f; color: #fff; }
        #timeline { border: 1px solid #dee2e6; }
        .info { margin-top: 8px; padding: 10px; background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 6px; min-height: 74px; font-size: 13.5px; line-height: 1.45; }
        .info b { color: #1f7a6f; }
    </style>
</head>
<body>
    <div class="wrap">
        <h2>Five Build Steps &rarr; Minimum vs Recommended Host</h2>
        <div class="controls"><button id="tierBtn">Highlight Minimum vs Recommended</button></div>
        <div id="timeline"></div>
        <div class="info" id="info">Four of five steps fit on the Minimum host; only Step 5 (the burst proof) needs the Recommended tier.</div>
    </div>
    <script>
        const info = {
            1: '<b>Step 1: Foundation, bootstrap, infra validation</b><br>Backing services only, no image needed yet. Host tier: <b>Minimum</b>.',
            2: '<b>Step 2: Ingest path (gateway -> processor -> ClickHouse)</b><br>Full stack, low volume. Host tier: <b>Minimum</b>.',
            3: '<b>Step 3: Load generator at the contract shape</b><br>200 statements/sec baseline. Host tier: <b>Minimum to Recommended</b>.',
            4: '<b>Step 4: Compression, graph, mastery correctness</b><br>Correctness proofs hold at any volume. Host tier: <b>Minimum</b>.',
            5: '<b>Step 5: The burst-throughput proof (200 -> 1,000/sec)</b><br>The measurement this stack exists to produce. Host tier: <b>Recommended</b> (16 GB, local NVMe).'
        };
        const teal = 'background-color:#2a9d8f;color:#fff;border-color:#1f7a6f;';
        const amber = 'background-color:#e9a23b;color:#222;border-color:#b8791f;';
        const gray = 'background-color:#9aa7b4;color:#fff;border-color:#5f6e82;';
        const items = new vis.DataSet([
            { id: 1, content: 'Step 1: Foundation', start: '2026-01-01', end: '2026-01-06', style: teal },
            { id: 2, content: 'Step 2: Ingest path', start: '2026-01-06', end: '2026-01-11', style: teal },
            { id: 3, content: 'Step 3: Loadgen 200/s', start: '2026-01-11', end: '2026-01-16', style: teal },
            { id: 4, content: 'Step 4: Compression/mastery', start: '2026-01-16', end: '2026-01-21', style: teal },
            { id: 5, content: 'Step 5: Burst proof', start: '2026-01-21', end: '2026-01-26', style: amber }
        ]);
        const timeline = new vis.Timeline(document.getElementById('timeline'), items, { showCurrentTime: false, stack: false, margin: { item: 10 }, zoomable: false });
        window.__tl = timeline;
        timeline.on('select', function (p) { const id = p.items[0]; document.getElementById('info').innerHTML = id ? info[id] : 'Click a step for its task and required tier.'; });
        let hi = false;
        document.getElementById('tierBtn').onclick = function () {
            hi = !hi; this.classList.toggle('active', hi);
            [1, 2, 3, 4].forEach(function (i) { items.update({ id: i, style: hi ? gray : teal }); });
            items.update({ id: 5, style: amber });
        };
    </script>
</body>
</html>
