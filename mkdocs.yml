# Intelligent Textbook — MkDocs Material configuration.
# Generated by the init-textbook skill. Customize as the book grows.
# Use the book-installer skill to add features incrementally
# (math, mascot, slides, learning graph viewer, etc.).

site_name: 'Learning Record Store'
site_description: 'An intelligent textbook on Learning Record Stores: what they are, how xAPI statements work, and how to design, deploy, and query an LRS.'
site_author: 'Dan McCreary'
site_url: 'https://dmccreary.github.io/learning-record-store/'

# Hooks — runs local Python before/after page processing.
# `plugins/social_override.py` injects og:title, og:description, og:image,
# og:type, og:url, and twitter:* meta tags on every page using each page's
# frontmatter `title:` / `description:` / `image:` (falling back to the site-
# wide values and `img/cover.png`). This is the Cairo-free path to social-
# media previews — works without `pip install "mkdocs-material[imaging]"`.
# If the `social` plugin below is ever enabled, the same hook also rewrites
# its auto-generated `/assets/images/social/...` URLs to point at the
# declared cover image. Verify the result with `bk-check-social-cover`.
hooks:
  - plugins/social_override.py

# Repository
repo_name: 'GitHub Repo'
repo_url: 'https://github.com/dmccreary/learning-record-store'
edit_uri: 'blob/main/docs'

# Copyright
copyright: 'Copyright &copy; 2026 Dan McCreary. Licensed under <a href="license/">CC BY-NC-SA 4.0</a> for non-commercial use.'

# Navigation
# IMPORTANT: do NOT add `navigation.tabs` — these books use side navigation
# optimized for wide landscape screens.
nav:
  - Home: index.md
  - About: about.md
  - Course Description: course-description.md

  - Specifications:
      - LRS Specification (v1): specs/lrs-spec-v1.md
      - LRS Design & Deployment (v1): specs/lrs-design-v1.md

  - Chapters:
      - List of Chapters: chapters/index.md
      # Add chapter entries here as content is generated, e.g.:
      # - 1. Introduction: chapters/01-introduction/index.md

  - Learning Graph:
      - Introduction: learning-graph/index.md
      # Generated by learning-graph-generator skill:
      # - Course Description Assessment: learning-graph/course-description-assessment.md
      # - Concept Enumeration: learning-graph/concept-list.md
      # - Concept Taxonomy: learning-graph/concept-taxonomy.md
      # - Graph Quality Analysis: learning-graph/quality-metrics.md
      # - Taxonomy Distribution: learning-graph/taxonomy-distribution.md

  - MicroSims:
      - List of MicroSims: sims/index.md
      - LRS Graph Data Model Explorer: sims/lrs-data-model/index.md
      - Sine Wave: sims/sine-wave/index.md

  - Glossary: glossary.md
  - License: license.md
  - Contact: contact.md

# Theme configuration
theme:
  name: material
  # Once a logo is generated, point this at docs/img/logo.png or a mascot pose:
  # logo: img/logo.png
  # favicon: img/favicon.ico
  palette:
    primary: 'indigo'
    accent: 'orange'
  include_sidebar: true
  features:
    - content.code.copy
    - content.action.edit
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share

# Plugins
plugins:
  - search
  # Uncomment after running `pip install "mkdocs-material[imaging]"`:
  # - social
  # Uncomment after running `pip install mkdocs-glightbox`:
  # - glightbox:
  #     touchNavigation: true
  #     loop: false
  #     effect: zoom
  #     slide_effect: slide
  #     width: 100%
  #     height: auto
  #     zoomable: true
  #     draggable: true
  #     auto_caption: false
  #     caption_position: bottom
  #     skip_classes:
  #       - mascot-admonition-img   # keep mascot poses out of the lightbox gallery

# Markdown extensions
markdown_extensions:
  - md_in_html
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  # Enable KaTeX LaTeX equation rendering
  # Using \(...\) for inline math to avoid conflicts with currency $
  # Block math uses $$ or \[...\]
  - pymdownx.arithmatex:
      generic: true
      inline_syntax: ['round']
      block_syntax: ['dollar', 'square']

# Custom CSS — file is created by init-textbook
extra_css:
  - css/extra.css
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css

# Custom JavaScript
extra_javascript:
  - js/katex.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js

# Exclude prompt scratch files and TODOs from build/search/sitemap
exclude_docs: |
  **/image-prompt*.md
  **/image-prompts*.md
  **/cover-prompt.md
  **/TODO.md

# Rebuild on changes during `mkdocs serve`
watch:
  - docs
  - mkdocs.yml

# Extra
extra:
  # Suppress the "Made with Material for MkDocs" footer line
  generator: false

  # MicroSim build-status indicators shown next to nav entries.
  # The status value is set per-page in the index.md frontmatter:
  #   status: scaffold | built | approved
  # Colors are defined as CSS custom properties in docs/css/extra.css.
  # Note: `theme.icon.status` is a Material Insiders feature and is silently
  # ignored on community Material. Do not add it — the CSS-variable approach
  # in extra.css is the load-bearing piece on the community edition.
  status:
    scaffold: Scaffold — placeholder, not yet implemented
    built: Built — implementation complete, awaiting review
    approved: Approved — tested and approved

  # Intelligent-textbook URI scheme (see
  # https://dmccreary.github.io/intelligent-textbooks/uri-scheme/)
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  textbook_name: 'Learning Record Store'
  textbook_version: '0.1'

  # Google Analytics — uncomment once a property ID exists:
  # analytics:
  #   provider: google
  #   property: G-XXXXXXXXXX
