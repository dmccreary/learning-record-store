# Theme configuration
theme:
  name: material
  logo: img/mascot/neutral.png
  # favicon: img/favicon.ico
  palette:
    primary: 'indigo'
    accent: 'orange'
  include_sidebar: true
  features:
    - content.code.copy
    - content.action.edit
    - navigation.expand
    - navigation.path
    - navigation.prune
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share

# Plugins
plugins:
  - search
  # Uncomment after running `pip install "mkdocs-material[imaging]"`:
  # - social
  # Uncomment after running `pip install mkdocs-glightbox`:
  # - glightbox:
  #     touchNavigation: true
  #     loop: false
  #     effect: zoom
  #     slide_effect: slide
  #     width: 100%
  #     height: auto
  #     zoomable: true
  #     draggable: true
  #     auto_caption: false
  #     caption_position: bottom
  #     skip_classes:
  #       - mascot-admonition-img   # keep mascot poses out of the lightbox gallery

# Markdown extensions
markdown_extensions:
  - md_in_html
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  # Enable KaTeX LaTeX equation rendering
  # Using \(...\) for inline math to avoid conflicts with currency $
  # Block math uses $$ or \[...\]
  - pymdownx.arithmatex:
      generic: true
      inline_syntax: ['round']
      block_syntax: ['dollar', 'square']

# Custom CSS — file is created by init-textbook
extra_css:
  - css/extra.css
  - css/mascot.css
  # The xAPI log panel. Its own file because sim iframes must <link> it directly —
  # an iframe payload does not inherit the site's stylesheets. One file, included twice.
  - css/lrs-xapi.css
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css

# Custom JavaScript
extra_javascript:
  - js/katex.js
  # Makes chapter quiz options answerable and emits one xAPI `answered` statement per
  # question — see docs/specs/xapi-producer-contract-v1.md. Loads site-wide and no-ops on
  # any page without a quiz.
  - js/quiz-xapi.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js
  - https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js

# Exclude prompt scratch files and TODOs from build/search/sitemap
exclude_docs: |
  **/image-prompt*.md
  **/image-prompts*.md
  **/cover-prompt.md
  **/TODO.md

# Rebuild on changes during `mkdocs serve`
watch:
  - docs
  - mkdocs.yml

# Extra
extra:
  # Suppress the "Made with Material for MkDocs" footer line
  generator: false

  # MicroSim build-status indicators shown next to nav entries.
  # The status value is set per-page in the index.md frontmatter:
  #   status: scaffold | built | approved
  # Colors are defined as CSS custom properties in docs/css/extra.css.
  # Note: `theme.icon.status` is a Material Insiders feature and is silently
  # ignored on community Material. Do not add it — the CSS-variable approach
  # in extra.css is the load-bearing piece on the community edition.
  status:
    scaffold: Scaffold — placeholder, not yet implemented
    built: Built — implementation complete, awaiting review
    approved: Approved — tested and approved

  # Intelligent-textbook URI scheme (see
  # https://dmccreary.github.io/intelligent-textbooks/uri-scheme/)
  schema: https://dmccreary.github.io/intelligent-textbooks/ns/textbook/v1
  textbook_name: 'Learning Record Store'
  textbook_version: '0.1'

  # Google Analytics — uncomment once a property ID exists:
  # analytics:
  #   provider: google
  #   property: G-XXXXXXXXXX
