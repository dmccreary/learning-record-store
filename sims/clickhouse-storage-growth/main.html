<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>ClickHouse Storage Growth</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #fff; color: #222; }
        .wrap { padding: 8px 12px; }
        h2 { font-size: 16px; color: #1a3a5c; text-align: center; margin: 4px 0 8px; }
        .chart-box { position: relative; height: 350px; }
        .controls { text-align: center; margin: 8px 0; }
        button { font-size: 13px; padding: 6px 12px; border: 1px solid #2a9d8f; background: #fff; color: #1f7a6f; border-radius: 5px; cursor: pointer; margin: 0 4px; }
        button.active { background: #2a9d8f; color: #fff; }
        .caption { font-size: 13px; color: #555; text-align: center; max-width: 680px; margin: 6px auto; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="wrap">
        <h2>ClickHouse Cumulative Storage (7-Year Retention)</h2>
        <div class="chart-box"><canvas id="c"></canvas></div>
        <div class="controls">
            <button id="mBtn" class="active">Months</button>
            <button id="yBtn">School years</button>
        </div>
        <p class="caption">At ~22 GB/day (~0.66 TB/month), primary disk grows steeply until month 13, when data older than 13 months tiers to S3/MinIO and the slope flattens toward ~28 TB. Kafka's 7-day buffer stays flat at ~1.1 TB.</p>
    </div>
    <script>
        // Build cumulative curve: 0.66 TB/month to month 13, then tiering flattens growth.
        const months = [];
        const chStore = [];
        let cum = 0;
        for (let m = 0; m <= 84; m++) {
            months.push(m);
            if (m > 0) { cum += (m <= 13) ? 0.66 : 0.20; }   // slope flattens after tiering
            chStore.push(Math.round(cum * 100) / 100);
        }
        const kafka = months.map(function () { return 1.1; });
        let unit = 'months';
        const chart = new Chart(document.getElementById('c'), {
            type: 'line',
            data: {
                labels: months,
                datasets: [
                    { label: 'ClickHouse primary-disk storage (TB)', data: chStore, borderColor: '#2a9d8f', backgroundColor: 'rgba(42,157,143,0.12)', fill: true, pointRadius: 0, tension: 0.2 },
                    { label: 'Kafka disk, 7-day retention (~1.1 TB)', data: kafka, borderColor: '#e9a23b', borderDash: [6, 4], pointRadius: 0 }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { tooltip: { callbacks: {
                    title: function (items) { const m = +items[0].label; return unit === 'months' ? ('Month ' + m) : ('School year ' + (m / 6).toFixed(1)); },
                    afterBody: function (items) { const m = +items[0].label; if (m === 13) return 'Tiering to S3/MinIO begins here'; if (m === 84) return '~28 TB at 7-year retention'; return ''; }
                } } },
                scales: {
                    y: { min: 0, max: 30, title: { display: true, text: 'Cumulative storage (TB)' } },
                    x: { title: { display: true, text: 'Months since launch' }, ticks: { callback: function (v) { return unit === 'months' ? v : (v % 6 === 0 ? ('Y' + v / 6) : ''); } } }
                }
            }
        });
        document.getElementById('mBtn').onclick = function () { unit = 'months'; chart.options.scales.x.title.text = 'Months since launch'; chart.update(); this.classList.add('active'); document.getElementById('yBtn').classList.remove('active'); };
        document.getElementById('yBtn').onclick = function () { unit = 'years'; chart.options.scales.x.title.text = 'School years (180-day year, ~6 months each)'; chart.update(); this.classList.add('active'); document.getElementById('mBtn').classList.remove('active'); };
    </script>
</body>
</html>
