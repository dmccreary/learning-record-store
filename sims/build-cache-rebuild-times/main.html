<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Build Cache Rebuild Times</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #fff; color: #222; }
        .wrap { padding: 8px 12px; }
        h2 { font-size: 16px; color: #1a3a5c; text-align: center; margin: 4px 0 8px; }
        .chart-box { position: relative; height: 340px; }
        .controls { text-align: center; margin: 8px 0; }
        button { font-size: 13px; padding: 6px 12px; border: 1px solid #2a9d8f; background: #fff; color: #1f7a6f; border-radius: 5px; cursor: pointer; margin: 0 4px; }
        button.active { background: #2a9d8f; color: #fff; }
        .caption { font-size: 13px; color: #555; text-align: center; max-width: 700px; margin: 6px auto; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="wrap">
        <h2>Rebuild Time: With vs Without the uv Cache Mount</h2>
        <div class="chart-box"><canvas id="c"></canvas></div>
        <div class="controls">
            <button id="absBtn" class="active">Absolute seconds</button>
            <button id="mulBtn">Multiple of fastest</button>
        </div>
        <p class="caption">The cache mount's payoff is Scenario 2: reusing already-downloaded packages cuts 65&nbsp;s to 12&nbsp;s. In Scenario 1 ordinary layer-skipping already does the work; in Scenario 3 nothing is cached yet, so the mount cannot help. (Illustrative figures.)</p>
    </div>
    <script>
        const labels = [['Code only changed', '(layer skip applies)'], ['uv.lock changed', '(dependency layer reruns)'], ['Cold machine', '(no prior cache)']];
        const withMount = [8, 12, 70];
        const without = [9, 65, 70];
        const why = {
            withMount: ['Dependency layer is skipped entirely; mount barely matters here.', 'The mount reuses already-downloaded packages instead of re-fetching them.', 'A cache mount cannot help a build with nothing cached yet.'],
            without: ['Layer cache already skips the dependency layer.', 'Without the mount, every package is downloaded again from scratch.', 'Nothing cached yet to reuse either way.']
        };
        let mode = 'abs';
        function dataFor(arr) { return mode === 'abs' ? arr : arr.map(function (v) { return +(v / 8).toFixed(2); }); }
        const chart = new Chart(document.getElementById('c'), {
            type: 'bar',
            data: { labels: labels, datasets: [
                { label: 'With cache mount', data: withMount.slice(), backgroundColor: '#2a9d8f' },
                { label: 'Without cache mount', data: without.slice(), backgroundColor: '#9aa7b4' }
            ] },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { tooltip: { callbacks: { afterLabel: function (ctx) { const k = ctx.datasetIndex === 0 ? 'withMount' : 'without'; return why[k][ctx.dataIndex]; } } } },
                scales: { y: { beginAtZero: true, title: { display: true, text: 'Rebuild time (seconds)' } } }
            }
        });
        function apply() {
            chart.data.datasets[0].data = dataFor(withMount);
            chart.data.datasets[1].data = dataFor(without);
            chart.options.scales.y.title.text = mode === 'abs' ? 'Rebuild time (seconds)' : 'Multiple of the fastest build (8 s)';
            chart.update();
        }
        document.getElementById('absBtn').onclick = function () { mode = 'abs'; apply(); this.classList.add('active'); document.getElementById('mulBtn').classList.remove('active'); };
        document.getElementById('mulBtn').onclick = function () { mode = 'mul'; apply(); this.classList.add('active'); document.getElementById('absBtn').classList.remove('active'); };
    </script>
</body>
</html>
