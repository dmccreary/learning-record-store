<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Production Monthly Cost Breakdown</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        * { box-sizing: border-box; }
        html, body { margin: 0; font-family: Arial, Helvetica, sans-serif; background: #fff; color: #222; }
        .wrap { padding: 8px 12px; }
        h2 { font-size: 16px; color: #1a3a5c; text-align: center; margin: 4px 0 8px; }
        .chart-box { position: relative; height: 320px; }
        .controls { text-align: center; margin: 8px 0; }
        button { font-size: 13px; padding: 6px 12px; border: 1px solid #2a9d8f; background: #fff; color: #1f7a6f; border-radius: 5px; cursor: pointer; }
        button.active { background: #2a9d8f; color: #fff; }
        .caption { font-size: 13px; color: #555; text-align: center; max-width: 700px; margin: 6px auto; line-height: 1.4; }
    </style>
</head>
<body>
    <div class="wrap">
        <h2>Production Monthly Cost &mdash; On-Demand vs Reserved</h2>
        <div class="chart-box"><canvas id="c"></canvas></div>
        <div class="controls"><button id="memBtn">Show Memgraph alternative</button></div>
        <p class="caption">Reserved pricing shrinks compute-heavy line items 30&ndash;50%, but the S3 cold tier and the Neo4j license do not discount. The Neo4j license (hatched, ~$3K&ndash;8K) is the largest source of estimate uncertainty.</p>
    </div>
    <script>
        const items = ['Kubernetes', 'Kafka', 'ClickHouse hot', 'ClickHouse cold (S3)', 'Neo4j infra', 'Neo4j license', 'Redis', 'PostgreSQL', 'Other'];
        const colors = ['#2a9d8f', '#3d7fc1', '#7b6cc4', '#9aa7b4', '#4c956c', '#e9a23b', '#e07a5f', '#5aa0c4', '#b0bdcc'];
        const onDemand = [2200, 1500, 1800, 400, 900, 2500, 300, 500, 200];   // ~10,300
        const reserved = [1300, 900, 1000, 400, 500, 2500, 180, 300, 120];    // ~7,200 (license & S3 flat)
        let memgraph = false;
        function ds() {
            return items.map(function (name, i) {
                let od = onDemand[i], rv = reserved[i];
                if (memgraph && name === 'Neo4j license') { od = 0; rv = 0; }
                return { label: (memgraph && name === 'Neo4j license') ? 'Memgraph (Apache-2.0, $0)' : name, data: [od, rv], backgroundColor: colors[i] };
            });
        }
        const chart = new Chart(document.getElementById('c'), {
            type: 'bar',
            data: { labels: ['On-Demand', 'Reserved (1-3 yr)'], datasets: ds() },
            options: {
                indexAxis: 'y', responsive: true, maintainAspectRatio: false,
                plugins: { tooltip: { callbacks: { label: function (ctx) { return ctx.dataset.label + ': $' + ctx.raw.toLocaleString(); } } }, legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } },
                scales: { x: { stacked: true, title: { display: true, text: 'Monthly cost (USD)' } }, y: { stacked: true } }
            }
        });
        document.getElementById('memBtn').onclick = function () {
            memgraph = !memgraph;
            this.classList.toggle('active', memgraph);
            this.textContent = memgraph ? 'Show Neo4j license' : 'Show Memgraph alternative';
            chart.data.datasets = ds();
            chart.update();
        };
    </script>
</body>
</html>
