<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="schema" content="https://dmccreary.github.io/intelligent-textbooks/ns/microsim/v1">
    <title>Total Learning Architecture Ecosystem Map</title>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="graph-panel">
            <div id="network"></div>
            <div class="title">Total Learning Architecture &mdash; Ecosystem Map</div>
        </div>
        <div class="info-panel">
            <h3>Details</h3>
            <div id="info-display"><p class="info-placeholder">Click a node to see details</p></div>
        </div>
    </div>
    <script>
        const TEAL = { background: '#2a9d8f', border: '#1f7a6f' };
        const GRAY = { background: '#6b7a8d', border: '#4a5666' };
        const NEUTRAL = { background: '#37474f', border: '#1c2529' };
        window.GRAPH = {
            layout: 'physics',
            nodes: [
                { id: 'Learner', label: 'Learner', color: NEUTRAL },
                { id: 'LRS', label: "This Project's LRS", color: TEAL, borderWidth: 4 },
                { id: 'CSR', label: 'Competency &\nSkills Registry', color: GRAY },
                { id: 'CRE', label: 'Content\nRecommendation Engine', color: GRAY },
                { id: 'Fed', label: 'Federated LRS\n(another org)', color: GRAY },
                { id: 'TLARef', label: 'TLA Reference\nImplementation', color: { background: '#8fd3c9', border: '#1f7a6f' }, shapeProperties: { borderDashes: [6, 4] }, font: { color: '#0c2f2b' } }
            ],
            edges: [
                { from: 'LRS', to: 'Learner', label: 'stores Statements about' },
                { from: 'CSR', to: 'LRS', label: 'maps mastered concepts to skills' },
                { from: 'CRE', to: 'LRS', label: 'reads Statement history' },
                { from: 'Fed', to: 'LRS', label: 'may exchange records' },
                { from: 'TLARef', to: 'LRS', dashes: true },
                { from: 'TLARef', to: 'CSR', dashes: true },
                { from: 'TLARef', to: 'CRE', dashes: true },
                { from: 'TLARef', to: 'Fed', dashes: true }
            ],
            nodeInfo: {
                'Learner': { title: 'Learner', description: 'The person whose record moves across the whole ecosystem. Every component here exists to serve, describe, or act on this learner&rsquo;s experience.' },
                'LRS': { title: "This Project's LRS", description: 'A Learning Record Store (Chapter 1): the system of record for xAPI Statements about the learner. It is highlighted to locate <em>this</em> project within the wider Total Learning Architecture &mdash; it is one component of the ecosystem, not a standalone system.' },
                'CSR': { title: 'Competency &amp; Skills Registry', description: 'Holds the canonical competency and skill identifiers. It maps the concepts a learner has mastered (per the LRS) onto named skills.' },
                'CRE': { title: 'Content Recommendation Engine', description: 'Reads the learner&rsquo;s Statement history from the LRS to recommend what content they should encounter next.' },
                'Fed': { title: 'Federated LRS', description: 'An LRS operated by a different organization. When a learner moves between organizations, the two LRSs may exchange records so the learner&rsquo;s history follows them.' },
                'TLARef': { title: 'TLA Reference Implementation', description: 'A working demo of this whole map, maintained by I2IDL. It is a reference/testing artifact &mdash; distinct from the xAPI Conformance Suite, which only tests a single LRS for spec conformance rather than demonstrating the end-to-end architecture.' }
            }
        };
    </script>
    <script src="vis-app.js"></script>
</body>
</html>
